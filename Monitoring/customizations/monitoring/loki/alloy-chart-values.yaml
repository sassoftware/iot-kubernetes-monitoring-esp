alloy:
  tolerations:
    - operator: Exists
  mounts:
    varlog: true
    dockercontainers: true
  configMap:
    create: true
    content: |
      discovery.kubernetes "kubernetes_pods" {
        role = "pod"

        selectors {
          role  = "pod"
          field = "spec.nodeName=" + coalesce(sys.env("HOSTNAME"), constants.hostname)
        }
      }
      
      discovery.relabel "kubernetes_pods" {
        targets = discovery.kubernetes.kubernetes_pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_controller_name"]
          regex         = "([0-9a-z-.]+?)(-[0-9a-f]{8,10})?"
          target_label  = "__tmp_controller_name"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name", "__meta_kubernetes_pod_label_app", "__tmp_controller_name", "__meta_kubernetes_pod_name"]
          regex         = "^;*([^;]+)(;.*)?$"
          target_label  = "app"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_instance", "__meta_kubernetes_pod_label_instance"]
          regex         = "^;*([^;]+)(;.*)?$"
          target_label  = "instance"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component", "__meta_kubernetes_pod_label_component"]
          regex         = "^;*([^;]+)(;.*)?$"
          target_label  = "component"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node_name"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["namespace", "app"]
          separator     = "/"
          target_label  = "job"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          target_label  = "__path__"
          replacement   = "/var/log/pods/*$1/*.log"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_annotationpresent_kubernetes_io_config_hash", "__meta_kubernetes_pod_annotation_kubernetes_io_config_hash", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          regex         = "true/(.*)"
          target_label  = "__path__"
          replacement   = "/var/log/pods/*$1/*.log"
        }
      }
      
      discovery.relabel "kubernetes_esp_pods" {
        targets = discovery.kubernetes.kubernetes_pods.targets

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          regex         = "/SASESP/metrics"
          action        = "keep"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_name"]
          regex         = ".+"
          action        = "drop"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "__service__"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "__host__"
        }

        rule {
          source_labels = ["__service__"]
          regex         = ""
          action        = "drop"
        }

        rule {
          regex  = "__meta_kubernetes_pod_label_(.+)"
          action = "labelmap"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace", "__service__"]
          separator     = "/"
          target_label  = "job"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_kubernetes_io_config_mirror", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          target_label  = "__path__"
          replacement   = "/var/log/pods/*$1/*.log"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          target_label  = "__path__"
          replacement   = "/var/log/pods/*$1/*.log"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          regex         = "sas-certframe"
          action        = "drop"
        }
      }

      loki.source.file "kubernetes_pods" {
        targets    = discovery.relabel.kubernetes_pods.output
        forward_to = [loki.process.kubernetes_pods.receiver]

        file_match {
          enabled = true
        }
        legacy_positions_file = "/run/promtail/positions.yaml"
      }

      loki.source.file "kubernetes_esp_pods" {
        targets    = discovery.relabel.kubernetes_esp_pods.output
        forward_to = [loki.process.kubernetes_esp_pods.receiver]

        file_match {
          enabled = true
        }
        legacy_positions_file = "/run/promtail/positions.yaml"
      }
      
      loki.process "kubernetes_pods" {
        forward_to = [loki.write.default.receiver]
        stage.cri {}
      }
      
      loki.process "kubernetes_esp_pods" {
        forward_to = [loki.write.default.receiver]
        stage.cri {}
      }

      loki.write "default" {
        endpoint {
          url = "http://loki-gateway/loki/api/v1/push"
        }
        external_labels = {}
      }